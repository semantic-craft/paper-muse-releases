name: Assemble PaperMuse 1.1.0 asset

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Assemble, verify, upload, and clean chunks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir parts
          gh release download papermuse-v1.1.0 \
            --repo semantic-craft/paper-muse-releases \
            --pattern 'PaperMuse-macos-arm64.zip.part-*' \
            --dir parts
          cd parts
          set -- PaperMuse-macos-arm64.zip.part-*
          test "$#" -eq 8
          cat "$@" > ../PaperMuse-macos-arm64.zip
          cd ..
          test "$(stat -c '%s' PaperMuse-macos-arm64.zip)" -eq 301497900
          echo "daf89c0af2ef0870655c2d361cb07d116eb8a403cce956b7864d30fd5b6b60bb  PaperMuse-macos-arm64.zip" | sha256sum --check --strict
          gh release upload papermuse-v1.1.0 PaperMuse-macos-arm64.zip \
            --repo semantic-craft/paper-muse-releases \
            --clobber
          remote_digest="$(gh release view papermuse-v1.1.0 \
            --repo semantic-craft/paper-muse-releases \
            --json assets \
            --jq '.assets[] | select(.name == "PaperMuse-macos-arm64.zip") | .digest')"
          test "$remote_digest" = "sha256:daf89c0af2ef0870655c2d361cb07d116eb8a403cce956b7864d30fd5b6b60bb"
          for part in parts/PaperMuse-macos-arm64.zip.part-*; do
            gh release delete-asset papermuse-v1.1.0 "${part##*/}" \
              --repo semantic-craft/paper-muse-releases \
              --yes
          done
